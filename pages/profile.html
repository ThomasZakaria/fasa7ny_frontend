<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - Fasa7ny</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../styles/home.css" />
    <link rel="stylesheet" href="../styles/profile.css" />
    <script src="../scripts/config.js"></script>
  </head>

  <body>
    <nav class="navbar">
      <h2 class="logo">Fasa7ny<span>.</span></h2>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="home.html#dynamicCategoriesContainer">Categories</a></li>
        <li>
          <a href="profile.html#myTripsTracker" class="active"
            ><i class="fas fa-suitcase"></i> Trips
            <span id="navTripsCount" class="nav-badge">0</span></a
          >
        </li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button
        onclick="logout()"
        class="login-btn logout-btn"
        style="background: #e74c3c; border: none"
      >
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </nav>

    <div
      class="profile-container"
      style="max-width: 900px; margin: 40px auto; padding: 0 20px"
    >
      <div
        class="profile-header"
        style="text-align: center; margin-bottom: 40px"
      >
        <div class="profile-avatar" style="font-size: 4rem; color: #0b4a6f">
          <i class="fas fa-user-circle"></i>
        </div>
        <div class="profile-info" style="margin-top: 15px">
          <h1 id="profileName" style="color: #2c3e50">Loading...</h1>
          <p id="profileEmail" style="color: #666; font-size: 1.1rem">
            Loading...
          </p>
        </div>
      </div>

      <section
        class="profile-section"
        style="
          background: #fff;
          padding: 25px;
          border-radius: 16px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
          margin-bottom: 30px;
        "
      >
        <h2
          class="section-title"
          style="
            color: #0b4a6f;
            border-bottom: 2px dashed #eee;
            padding-bottom: 15px;
          "
        >
          <i class="fas fa-heart" style="color: #e74c3c"></i> My Interests
        </h2>
        <div
          style="
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
          "
        >
          <input
            type="text"
            id="newInterest"
            placeholder="e.g., Pyramids, Museums..."
            style="
              flex: 1;
              padding: 12px;
              border-radius: 10px;
              border: 1px solid #ccc;
              outline: none;
              font-family: &quot;Poppins&quot;, sans-serif;
            "
          />
          <button
            onclick="addInterest()"
            style="
              padding: 0 25px;
              background: #ff9800;
              color: white;
              border: none;
              border-radius: 10px;
              cursor: pointer;
              font-weight: 600;
              font-family: &quot;Poppins&quot;, sans-serif;
              transition: 0.3s;
            "
          >
            Add
          </button>
        </div>
        <div id="interestsContainer" class="tags-container"></div>
      </section>
      <section
        class="profile-section"
        style="
          background: #fff;
          padding: 25px;
          border-radius: 16px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
          margin-bottom: 30px;
        "
      >
        <style>
          .adventure-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            margin-top: 15px;
          }
          .stat-card-premium {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
          }
          .stat-card-num {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0b4a6f;
            margin-bottom: 2px;
          }
          .stat-card-lbl {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
          }
          .active-trip-hero {
            background: linear-gradient(135deg, #0b4a6f 0%, #1e293b 100%);
            color: white;
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(11, 74, 111, 0.12);
          }
          .active-trip-hero-bg {
            position: absolute;
            inset: 0;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: 1;
          }
          .active-trip-hero-content {
            position: relative;
            z-index: 2;
          }
          .adventure-section-title {
            font-size: 1.2rem;
            color: #0b4a6f;
            font-weight: 600;
            margin-top: 25px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 8px;
          }
          .dashboard-trip-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
          }
          .trip-banner-cover {
            height: 120px;
            position: relative;
          }
          .trip-banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
          }
          .trip-banner-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
              to top,
              rgba(0, 0, 0, 0.7) 0%,
              rgba(0, 0, 0, 0.1) 100%
            );
          }
          .trip-banner-content {
            position: absolute;
            bottom: 12px;
            left: 15px;
            right: 15px;
            color: white;
          }
          .status-badge-pill {
            position: absolute;
            top: 12px;
            right: 15px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
          }
          .status-active {
            background: #22c55e;
            color: white;
          }
          .status-upcoming {
            background: #3b82f6;
            color: white;
          }
          .status-completed {
            background: #64748b;
            color: white;
          }
          .day-acc-header {
            background: #f8fafc;
            padding: 12px 15px;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
          }
          .day-acc-header:hover {
            background: #f1f5f9;
          }
          .day-acc-body {
            display: none;
            background: white;
            padding: 15px;
            border-bottom: 1px solid #edf2f7;
          }
          .nav-badge {
            background: #ff9800;
            color: white;
            border-radius: 10px;
            padding: 1px 6px;
            font-size: 0.75rem;
            font-weight: bold;
          }
        </style>

        <h2
          id="myTripsTracker"
          class="section-title"
          style="
            color: #0b4a6f;
            border-bottom: 2px dashed #eee;
            padding-bottom: 15px;
          "
        >
          <i class="fas fa-route" style="color: #27ae60"></i> My Adventures
        </h2>

        <div class="adventure-stats-grid">
          <div class="stat-card-premium">
            <div id="statsTotalTrips" class="stat-card-num">0</div>
            <div class="stat-card-lbl">Total Trips</div>
          </div>
          <div class="stat-card-premium">
            <div id="statsPlacesVisited" class="stat-card-num">0</div>
            <div class="stat-card-lbl">Places Visited</div>
          </div>
          <div class="stat-card-premium">
            <div id="statsPlacesRemaining" class="stat-card-num">0</div>
            <div class="stat-card-lbl">Places Remaining</div>
          </div>
          <div class="stat-card-premium">
            <div id="statsCompletionRate" class="stat-card-num">0%</div>
            <div class="stat-card-lbl">Completion Rate</div>
          </div>
        </div>

        <div id="activeTripHeroContainer"></div>

        <div id="profileTripsList">
          <p style="text-align: center; color: #666">
            Loading your adventures...
          </p>
        </div>
      </section>
      <section
        class="profile-section"
        style="
          background: #fff;
          padding: 25px;
          border-radius: 16px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
          margin-bottom: 30px;
        "
      >
        <h2
          class="section-title"
          style="
            color: #0b4a6f;
            border-bottom: 2px dashed #eee;
            padding-bottom: 15px;
          "
        >
          <i class="fas fa-history" style="color: #0b4a6f"></i> Scan History &
          Past Trips
        </h2>
        <div
          id="historyContainer"
          class="cards profile-cards"
          style="margin-top: 15px"
        ></div>
      </section>

      <section
        class="profile-section"
        style="
          background: #fff;
          padding: 25px;
          border-radius: 16px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
          margin-bottom: 30px;
        "
      >
        <h2
          class="section-title"
          style="
            color: #0b4a6f;
            border-bottom: 2px dashed #eee;
            padding-bottom: 15px;
          "
        >
          <i class="fas fa-bookmark" style="color: #ff9800"></i> Saved Places
        </h2>
        <div
          id="savedContainer"
          class="cards profile-cards"
          style="margin-top: 15px"
        ></div>
      </section>
    </div>

    <script src="../scripts/profile.js"></script>
  </body>
</html>
