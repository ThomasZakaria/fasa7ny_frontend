<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - Fasa7ny</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../styles/home.css" />
    <link rel="stylesheet" href="../styles/profile.css" />
    <script src="../scripts/config.js"></script>
  </head>

  <body>
    <nav class="navbar">
      <h2 class="logo">Fasa7ny<span>.</span></h2>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="home.html#dynamicCategoriesContainer">Categories</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button
        onclick="logout()"
        class="login-btn logout-btn"
        style="background: #e74c3c; border: none"
      >
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </nav>

    <div
      class="profile-container"
      style="max-width: 900px; margin: 40px auto; padding: 0 20px"
    >
      <div
        class="profile-header"
        style="text-align: center; margin-bottom: 40px"
      >
        <div class="profile-avatar" style="font-size: 4rem; color: #0b4a6f">
          <i class="fas fa-user-circle"></i>
        </div>
        <div class="profile-info" style="margin-top: 15px">
          <h1 id="profileName" style="color: #2c3e50">Loading...</h1>
          <p id="profileEmail" style="color: #666; font-size: 1.1rem">
            Loading...
          </p>
        </div>
      </div>

      <section
        class="profile-section"
        style="
          background: #fff;
          padding: 25px;
          border-radius: 16px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
          margin-bottom: 30px;
        "
      >
        <h2
          class="section-title"
          style="
            color: #0b4a6f;
            border-bottom: 2px dashed #eee;
            padding-bottom: 15px;
          "
        >
          <i class="fas fa-heart" style="color: #e74c3c"></i> My Interests
        </h2>
        <div
          style="
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
          "
        >
          <input
            type="text"
            id="newInterest"
            placeholder="e.g., Pyramids, Museums..."
            style="
              flex: 1;
              padding: 12px;
              border-radius: 10px;
              border: 1px solid #ccc;
              outline: none;
              font-family: &quot;Poppins&quot;, sans-serif;
            "
          />
          <button
            onclick="addInterest()"
            style="
              padding: 0 25px;
              background: #ff9800;
              color: white;
              border: none;
              border-radius: 10px;
              cursor: pointer;
              font-weight: 600;
              font-family: &quot;Poppins&quot;, sans-serif;
              transition: 0.3s;
            "
          >
            Add
          </button>
        </div>
        <div id="interestsContainer" class="tags-container"></div>
      </section>

      <section
        class="profile-section"
        style="
          background: #fff;
          padding: 25px;
          border-radius: 16px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
          margin-bottom: 30px;
        "
      >
        <h2
          id="myTripsTracker"
          class="section-title"
          style="
            color: #0b4a6f;
            border-bottom: 2px dashed #eee;
            padding-bottom: 15px;
          "
        >
          <i class="fas fa-route" style="color: #27ae60"></i> My Trips Tracker
        </h2>
        <div id="profileTripsList" style="margin-top: 15px">
          <p style="text-align: center; color: #666">Loading your trips...</p>
        </div>
      </section>

      <section
        class="profile-section"
        style="
          background: #fff;
          padding: 25px;
          border-radius: 16px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
          margin-bottom: 30px;
        "
      >
        <h2
          class="section-title"
          style="
            color: #0b4a6f;
            border-bottom: 2px dashed #eee;
            padding-bottom: 15px;
          "
        >
          <i class="fas fa-history" style="color: #0b4a6f"></i> Scan History &
          Past Trips
        </h2>
        <div
          id="historyContainer"
          class="cards profile-cards"
          style="margin-top: 15px"
        ></div>
      </section>

      <section
        class="profile-section"
        style="
          background: #fff;
          padding: 25px;
          border-radius: 16px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
          margin-bottom: 30px;
        "
      >
        <h2
          class="section-title"
          style="
            color: #0b4a6f;
            border-bottom: 2px dashed #eee;
            padding-bottom: 15px;
          "
        >
          <i class="fas fa-bookmark" style="color: #ff9800"></i> Saved Places
        </h2>
        <div
          id="savedContainer"
          class="cards profile-cards"
          style="margin-top: 15px"
        ></div>
      </section>
    </div>

    <script src="../scripts/profile.js"></script>
  </body>
</html>
